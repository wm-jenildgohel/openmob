name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.29.3'
  NODE_VERSION: '24'

jobs:
  # ─── Step 1: Set version in source BEFORE building ───
  set-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_clean: ${{ steps.version.outputs.version_clean }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.version }}"
          else
            RAW="${GITHUB_REF#refs/tags/}"
          fi
          CLEAN="${RAW#v}"
          echo "version=$RAW" >> $GITHUB_OUTPUT
          echo "version_clean=$CLEAN" >> $GITHUB_OUTPUT
          echo "Version: $RAW (clean: $CLEAN)"

      - name: Update version in source files
        run: |
          VERSION="${{ steps.version.outputs.version_clean }}"

          # Update pubspec.yaml
          sed -i "s/^version: .*/version: ${VERSION}+1/" openmob_hub/pubspec.yaml

          # Update update_service.dart
          sed -i "s/const _currentVersion = '.*'/const _currentVersion = '${VERSION}'/" openmob_hub/lib/services/update_service.dart

          echo "Updated files:"
          grep "^version:" openmob_hub/pubspec.yaml
          grep "_currentVersion" openmob_hub/lib/services/update_service.dart

      - name: Commit version bump
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add openmob_hub/pubspec.yaml openmob_hub/lib/services/update_service.dart
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to ${VERSION} [skip ci]"
          git push

  # ─── Build Hub (Linux + Windows) ───
  build-hub-linux:
    needs: [set-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Pull latest (includes version bump)
        run: git pull origin ${{ github.ref_name }} || true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev

      - name: Build Hub (Linux)
        working-directory: openmob_hub
        run: |
          flutter pub get
          flutter build linux --release

      - name: Package Hub (Linux)
        run: |
          mkdir -p artifacts/linux
          cp -r openmob_hub/build/linux/x64/release/bundle/* artifacts/linux/

      - uses: actions/upload-artifact@v4
        with:
          name: hub-linux-x64
          path: artifacts/linux/

  build-hub-windows:
    needs: [set-version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Pull latest (includes version bump)
        run: git pull origin ${{ github.ref_name }} || true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Build Hub (Windows)
        working-directory: openmob_hub
        run: |
          flutter pub get
          flutter build windows --release

      - name: Verify Hub launches
        shell: cmd
        run: |
          start /B openmob_hub\build\windows\x64\runner\Release\openmob_hub.exe
          timeout /t 5 /nobreak >nul
          taskkill /F /IM openmob_hub.exe 2>nul || echo "Hub exited on its own"

      - name: Package Hub (Windows)
        shell: bash
        run: |
          mkdir -p artifacts/windows
          cp -r openmob_hub/build/windows/x64/runner/Release/* artifacts/windows/

      - uses: actions/upload-artifact@v4
        with:
          name: hub-windows-x64
          path: artifacts/windows/

  # ─── Build AiBridge (Linux + Windows + macOS) ───
  build-bridge:
    needs: [set-version]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: aibridge
            name: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: aibridge.exe
            name: windows-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: aibridge
            name: macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: aibridge
            name: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build AiBridge
        working-directory: openmob_bridge
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify binary runs
        if: matrix.target != 'aarch64-apple-darwin'
        shell: bash
        run: |
          if [[ "${{ matrix.artifact }}" == *.exe ]]; then
            openmob_bridge/target/${{ matrix.target }}/release/${{ matrix.artifact }} --help || true
          else
            chmod +x openmob_bridge/target/${{ matrix.target }}/release/${{ matrix.artifact }}
            openmob_bridge/target/${{ matrix.target }}/release/${{ matrix.artifact }} --help || true
          fi

      - name: Package
        shell: bash
        run: |
          mkdir -p artifacts
          cp openmob_bridge/target/${{ matrix.target }}/release/${{ matrix.artifact }} artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.name }}
          path: artifacts/

  # ─── Build MCP Server (cross-platform Node.js bundle) ───
  build-mcp:
    needs: [set-version]
    strategy:
      matrix:
        include:
          - target: node20-linux-x64
            output: openmob-mcp
            name: linux-x64
          - target: node20-win-x64
            output: openmob-mcp.exe
            name: windows-x64
          - target: node20-macos-x64
            output: openmob-mcp
            name: macos-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & Build
        working-directory: openmob_mcp
        run: |
          npm install
          npm run build

      - name: Bundle into single file (esbuild)
        working-directory: openmob_mcp
        run: |
          npx esbuild build/app/index.js --bundle --platform=node --target=node20 --format=cjs --outfile=dist/openmob-mcp-bundle.cjs

      - name: Create standalone binary (yao-pkg)
        working-directory: openmob_mcp
        run: |
          npx @yao-pkg/pkg dist/openmob-mcp-bundle.cjs --target ${{ matrix.target }} --output dist/${{ matrix.output }}

      - uses: actions/upload-artifact@v4
        with:
          name: mcp-${{ matrix.name }}
          path: openmob_mcp/dist/${{ matrix.output }}

  # ─── Package & Release ───
  release:
    needs: [build-hub-linux, build-hub-windows, build-bridge, build-mcp, set-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package Linux distribution
        run: |
          VERSION="${{ needs.set-version.outputs.version }}"
          mkdir -p release/openmob-linux-x64
          cp -r artifacts/hub-linux-x64/* release/openmob-linux-x64/
          cp artifacts/bridge-linux-x64/aibridge release/openmob-linux-x64/
          chmod +x release/openmob-linux-x64/aibridge
          cp artifacts/mcp-linux-x64/openmob-mcp release/openmob-linux-x64/
          chmod +x release/openmob-linux-x64/openmob-mcp
          cp -r openmob_skills release/openmob-linux-x64/
          cp dist/openmob-linux-x64/openmob release/openmob-linux-x64/ 2>/dev/null || true
          chmod +x release/openmob-linux-x64/openmob 2>/dev/null || true
          cd release && tar -czf openmob-${VERSION}-linux-x64.tar.gz openmob-linux-x64/

      - name: Package Windows distribution
        run: |
          VERSION="${{ needs.set-version.outputs.version }}"
          mkdir -p release/openmob-windows-x64
          cp -r artifacts/hub-windows-x64/* release/openmob-windows-x64/
          cp artifacts/bridge-windows-x64/aibridge.exe release/openmob-windows-x64/
          cp artifacts/mcp-windows-x64/openmob-mcp.exe release/openmob-windows-x64/
          cp -r openmob_skills release/openmob-windows-x64/
          cat > release/openmob-windows-x64/INSTALL.txt << 'INSTALLEOF'
          OpenMob - Installation Guide
          ============================

          1. Extract this folder to any location (Desktop, Documents, etc.)
          2. Double-click "openmob_hub.exe" to start

          IMPORTANT - Windows SmartScreen Warning:
          Windows may show "Windows protected your PC" the first time you run OpenMob.
          This is normal for new software that hasn't been widely downloaded yet.

          To continue:
          1. Click "More info"
          2. Click "Run anyway"

          This only happens once. OpenMob runs entirely on your computer
          and never sends data to the internet.

          Need help? Visit: https://github.com/wm-jenildgohel/openmob
          INSTALLEOF
          cp dist/openmob-windows-x64/openmob.bat release/openmob-windows-x64/ 2>/dev/null || true
          cd release && zip -r openmob-${VERSION}-windows-x64.zip openmob-windows-x64/

      - name: Package macOS distribution
        run: |
          VERSION="${{ needs.set-version.outputs.version }}"
          mkdir -p release/openmob-macos-x64
          cp artifacts/bridge-macos-x64/aibridge release/openmob-macos-x64/aibridge
          cp artifacts/bridge-macos-arm64/aibridge release/openmob-macos-x64/aibridge-arm64
          cp artifacts/mcp-macos-x64/openmob-mcp release/openmob-macos-x64/
          chmod +x release/openmob-macos-x64/openmob-mcp
          cp -r openmob_skills release/openmob-macos-x64/
          cd release && tar -czf openmob-${VERSION}-macos-x64.tar.gz openmob-macos-x64/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.set-version.outputs.version }}
          name: OpenMob ${{ needs.set-version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/openmob-${{ needs.set-version.outputs.version }}-linux-x64.tar.gz
            release/openmob-${{ needs.set-version.outputs.version }}-windows-x64.zip
            release/openmob-${{ needs.set-version.outputs.version }}-macos-x64.tar.gz
