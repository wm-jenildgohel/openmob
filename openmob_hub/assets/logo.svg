<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C3AED"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Phone outline -->
  <rect x="160" y="80" width="192" height="352" rx="24" ry="24" fill="none" stroke="#FFFFFF" stroke-width="12"/>

  <!-- Phone screen -->
  <rect x="176" y="112" width="160" height="288" rx="8" ry="8" fill="url(#screen)"/>

  <!-- Screen content: signal lines (representing AI seeing the device) -->
  <line x1="200" y1="200" x2="312" y2="200" stroke="#A78BFA" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="200" y1="230" x2="280" y2="230" stroke="#A78BFA" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <line x1="200" y1="260" x2="296" y2="260" stroke="#A78BFA" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="200" y1="290" x2="264" y2="290" stroke="#A78BFA" stroke-width="6" stroke-linecap="round" opacity="0.5"/>

  <!-- Tap indicator circle -->
  <circle cx="256" cy="340" r="16" fill="none" stroke="#10B981" stroke-width="4" opacity="0.8"/>
  <circle cx="256" cy="340" r="6" fill="#10B981" opacity="0.9"/>

  <!-- Connection waves (left side - AI connecting) -->
  <path d="M120 200 Q96 256 120 312" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <path d="M96 180 Q60 256 96 332" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <path d="M72 160 Q28 256 72 352" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.2"/>

  <!-- Connection waves (right side - AI connecting) -->
  <path d="M392 200 Q416 256 392 312" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <path d="M416 180 Q452 256 416 332" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <path d="M440 160 Q484 256 440 352" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
</svg>
